<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | SmashHIT</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet" />
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <!-- Vue 3 CDN -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <!-- Separate CSS file -->
    <link rel="stylesheet" href="css/login.css" />
</head>
<body>

    <div id="app">
        <!-- ===== LOGIN SECTION ===== -->
        <section class="login-section">
            <img src="images/aunthentication_bg.png" alt="Login Background" class="login-bg-image" />
            <div class="login-overlay"></div>
            <div class="login-container">
                <div class="login-card">
                    <h1 class="login-title">WELCOME BACK!</h1>
                    <p class="login-subtitle">Log in to book courts, view bookings, and manage your account.</p>

                    <form @submit.prevent="handleLogin" class="login-form">
                        <div class="form-group">
                            <label for="username">Username</label>
                            <input 
                                type="text" 
                                id="username" 
                                v-model="username" 
                                placeholder="Enter your username"
                                @blur="validateField('username')"
                                :class="{ 'error': errors.username }"
                            />
                            <span class="error-message" v-if="errors.username">{{ errors.username }}</span>
                        </div>

                        <div class="form-group">
                            <label for="password">Password</label>
                            <div class="password-wrapper">
                                <input 
                                    :type="showPassword ? 'text' : 'password'" 
                                    id="password" 
                                    v-model="password" 
                                    placeholder="Enter your password"
                                    @blur="validateField('password')"
                                    :class="{ 'error': errors.password }"
                                />
                                <button type="button" class="toggle-password" @click="togglePasswordVisibility">
                                    <i :class="showPassword ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
                                </button>
                            </div>
                            <span class="error-message" v-if="errors.password">{{ errors.password }}</span>
                        </div>

                        <div class="form-options">
                            <label class="remember-me">
                                <input type="checkbox" v-model="rememberMe" />
                                <span class="checkmark"></span>
                                Remember me
                            </label>
                            <a href="forgot_pass.html" class="forgot-password">Forgot Password?</a>
                        </div>

                        <button type="submit" class="login-btn">Login</button>
                    </form>

                    <div class="divider">
                        <span>or continue with</span>
                    </div>

                    <div class="social-login">
                        <button class="social-btn google">
                            <i class="fab fa-google"></i>
                            Google
                        </button>
                        <button class="social-btn facebook">
                            <i class="fab fa-facebook-f"></i>
                            Facebook
                        </button>
                    </div>

                    <p class="signup-link">
                        Don't have an account? <a href="register.html">Sign up here</a>
                    </p>
                </div>
            </div>
        </section>
    </div>

    <!-- ===== VUE SECTION ===== -->
    <script>
        const { createApp, ref, reactive } = Vue;

        const app = createApp({
            setup() {
                const username = ref('');
                const password = ref('');
                const rememberMe = ref(false);
                const showPassword = ref(false);

                const errors = reactive({
                    username: '',
                    password: ''
                });

                const validateField = (field) => {
                    if (field === 'username') {
                        if (!username.value || username.value.trim() === '') {
                            errors.username = 'Username is required';
                        } else {
                            errors.username = '';
                        }
                    }
                    if (field === 'password') {
                        if (!password.value || password.value.trim() === '') {
                            errors.password = 'Password is required';
                        } else {
                            errors.password = '';
                        }
                    }
                };

                const validateForm = () => {
                    let isValid = true;
                    
                    if (!username.value || username.value.trim() === '') {
                        errors.username = 'Username is required';
                        isValid = false;
                    } else {
                        errors.username = '';
                    }
                    
                    if (!password.value || password.value.trim() === '') {
                        errors.password = 'Password is required';
                        isValid = false;
                    } else {
                        errors.password = '';
                    }
                    
                    return isValid;
                };

                const togglePasswordVisibility = () => {
                    showPassword.value = !showPassword.value;
                };

                const handleLogin = () => {
                    if (validateForm()) {
                        alert(`Welcome back, ${username.value}!`);
                        // window.location.href = 'homepage.html';
                    }
                };

                return {
                    username,
                    password,
                    rememberMe,
                    showPassword,
                    errors,
                    validateField,
                    togglePasswordVisibility,
                    handleLogin
                };
            }
        });

        app.mount('#app');
    </script>
</body>
</html>
