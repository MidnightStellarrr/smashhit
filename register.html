<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | SmashHIT</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet" />
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <!-- Vue 3 CDN -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <!-- Separate CSS file -->
    <link rel="stylesheet" href="css/register.css" />
</head>
<body>

    <div id="app">
        <!-- ===== REGISTER SECTION ===== -->
        <section class="register-section">
            <img src="images/aunthentication_bg.png" alt="Register Background" class="register-bg-image" />
            <div class="register-overlay"></div>
            <div class="register-container">
                <div class="register-card">
                    <h1 class="register-title">CREATE ACCOUNT</h1>
                    <p class="register-subtitle">Sign up to book courts, view bookings, and manage your account.</p>

                    <form @submit.prevent="handleRegister" class="register-form">
                        <!-- Name Row -->
                        <div class="form-row">
                            <div class="form-group half">
                                <label for="firstName">First Name</label>
                                <input 
                                    type="text" 
                                    id="firstName" 
                                    v-model="firstName" 
                                    placeholder="Enter first name"
                                    required
                                />
                            </div>
                            <div class="form-group half">
                                <label for="lastName">Last Name</label>
                                <input 
                                    type="text" 
                                    id="lastName" 
                                    v-model="lastName" 
                                    placeholder="Enter last name"
                                    required
                                />
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="email">Email</label>
                            <input 
                                type="email" 
                                id="email" 
                                v-model="email" 
                                placeholder="Enter your email"
                                required
                            />
                        </div>

                        <div class="form-group">
                            <label for="phone">Phone Number <span class="optional">(Optional)</span></label>
                            <input 
                                type="tel" 
                                id="phone" 
                                v-model="phone" 
                                placeholder="Enter your phone number"
                            />
                        </div>
                        <div class="form-group">
                            <label for="password">Password</label>
                            <div class="password-wrapper">
                                <input 
                                    :type="showPassword ? 'text' : 'password'" 
                                    id="password" 
                                    v-model="password" 
                                    placeholder="Create a password"
                                    required
                                />
                                <button type="button" class="toggle-password" @click="togglePasswordVisibility">
                                    <i :class="showPassword ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
                                </button>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="confirmPassword">Confirm Password</label>
                            <div class="password-wrapper">
                                <input 
                                    :type="showConfirmPassword ? 'text' : 'password'" 
                                    id="confirmPassword" 
                                    v-model="confirmPassword" 
                                    placeholder="Confirm your password"
                                    required
                                />
                                <button type="button" class="toggle-password" @click="toggleConfirmPasswordVisibility">
                                    <i :class="showConfirmPassword ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
                                </button>
                            </div>
                        </div>

                        <div class="form-options">
                            <label class="terms">
                                <input type="checkbox" v-model="agreeTerms" />
                                <span class="checkmark"></span>
                                I agree to the Terms & Conditions
                            </label>
                        </div>

                        <button type="submit" class="register-btn" :disabled="!agreeTerms">Create Account</button>
                    </form>

                    <div class="divider">
                        <span>or continue with</span>
                    </div>

                    <div class="social-register">
                        <button class="social-btn google">
                            <i class="fab fa-google"></i>
                            Google
                        </button>
                        <button class="social-btn facebook">
                            <i class="fab fa-facebook-f"></i>
                            Facebook
                        </button>
                    </div>

                    <p class="login-link">
                        Already have an account? <a href="login.html">Log in here</a>
                    </p>
                </div>
            </div>
        </section>
    </div>

    <!-- ===== VUE SECTION ===== -->
    <script>
        const { createApp, ref } = Vue;

        const app = createApp({
            setup() {
                const firstName = ref('');
                const lastName = ref('');
                const email = ref('');
                const phone = ref('');
                const username = ref('');
                const password = ref('');
                const confirmPassword = ref('');
                const agreeTerms = ref(false);
                const showPassword = ref(false);
                const showConfirmPassword = ref(false);

                const togglePasswordVisibility = () => {
                    showPassword.value = !showPassword.value;
                };

                const toggleConfirmPasswordVisibility = () => {
                    showConfirmPassword.value = !showConfirmPassword.value;
                };

                const handleRegister = () => {
                    if (firstName.value && lastName.value && email.value && username.value && password.value && confirmPassword.value) {
                        if (password.value !== confirmPassword.value) {
                            alert('Passwords do not match!');
                            return;
                        }
                        if (!agreeTerms.value) {
                            alert('Please agree to the Terms & Conditions.');
                            return;
                        }
                        const fullName = `${firstName.value} ${lastName.value}`;
                        alert(`Account created successfully for ${fullName}!`);
                        // window.location.href = 'login.html';
                    } else {
                        alert('Please fill in all required fields.');
                    }
                };

                return {
                    firstName,
                    lastName,
                    email,
                    phone,
                    username,
                    password,
                    confirmPassword,
                    agreeTerms,
                    showPassword,
                    showConfirmPassword,
                    togglePasswordVisibility,
                    toggleConfirmPasswordVisibility,
                    handleRegister
                };
            }
        });

        app.mount('#app');
    </script>
</body>
</html>
