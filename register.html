<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | SmashHIT</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet" />
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <!-- Vue 3 CDN -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <!-- Separate CSS file -->
    <link rel="stylesheet" href="css/register.css" />
</head>
<body>

    <div id="app">
        <!-- ===== REGISTER SECTION ===== -->
        <section class="register-section">
            <img src="images/aunthentication_bg.png" alt="Register Background" class="register-bg-image" />
            <div class="register-overlay"></div>
            <div class="register-container">
                <div class="register-card">
                    <h1 class="register-title">CREATE ACCOUNT</h1>
                    <p class="register-subtitle">Sign up to book courts, view bookings, and manage your account.</p>

                    <form @submit.prevent="handleRegister" class="register-form">
                        <!-- Name Row -->
                        <div class="form-row">
                            <div class="form-group half">
                                <label for="firstName">First Name</label>
                                <input 
                                    type="text" 
                                    id="firstName" 
                                    v-model="firstName" 
                                    placeholder="Enter first name"
                                    @blur="validateField('firstName')"
                                    :class="{ 'error': errors.firstName }"
                                />
                                <span class="error-message" v-if="errors.firstName">{{ errors.firstName }}</span>
                            </div>
                            <div class="form-group half">
                                <label for="lastName">Last Name</label>
                                <input 
                                    type="text" 
                                    id="lastName" 
                                    v-model="lastName" 
                                    placeholder="Enter last name"
                                    @blur="validateField('lastName')"
                                    :class="{ 'error': errors.lastName }"
                                />
                                <span class="error-message" v-if="errors.lastName">{{ errors.lastName }}</span>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="email">Email</label>
                            <input 
                                type="email" 
                                id="email" 
                                v-model="email" 
                                placeholder="Enter your email"
                                @blur="validateField('email')"
                                :class="{ 'error': errors.email }"
                            />
                            <span class="error-message" v-if="errors.email">{{ errors.email }}</span>
                        </div>

                        <div class="form-group">
                            <label for="phone">Phone Number <span class="optional">(Optional)</span></label>
                            <input 
                                type="tel" 
                                id="phone" 
                                v-model="phone" 
                                placeholder="Enter your phone number"
                            />
                        </div>

                        <div class="form-group">
                            <label for="password">Password</label>
                            <div class="password-wrapper">
                                <input 
                                    :type="showPassword ? 'text' : 'password'" 
                                    id="password" 
                                    v-model="password" 
                                    placeholder="Create a password"
                                    @blur="validateField('password')"
                                    :class="{ 'error': errors.password }"
                                />
                                <button type="button" class="toggle-password" @click="togglePasswordVisibility">
                                    <i :class="showPassword ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
                                </button>
                            </div>
                            <span class="error-message" v-if="errors.password">{{ errors.password }}</span>
                        </div>

                        <div class="form-group">
                            <label for="confirmPassword">Confirm Password</label>
                            <div class="password-wrapper">
                                <input 
                                    :type="showConfirmPassword ? 'text' : 'password'" 
                                    id="confirmPassword" 
                                    v-model="confirmPassword" 
                                    placeholder="Confirm your password"
                                    @blur="validateField('confirmPassword')"
                                    :class="{ 'error': errors.confirmPassword }"
                                />
                                <button type="button" class="toggle-password" @click="toggleConfirmPasswordVisibility">
                                    <i :class="showConfirmPassword ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
                                </button>
                            </div>
                            <span class="error-message" v-if="errors.confirmPassword">{{ errors.confirmPassword }}</span>
                        </div>

                        <div class="form-options">
                            <label class="terms">
                                <input type="checkbox" v-model="agreeTerms" />
                                <span class="checkmark"></span>
                                I agree to the Terms & Conditions
                            </label>
                        </div>

                        <button type="submit" class="register-btn" :disabled="!agreeTerms">Create Account</button>
                    </form>

                    <div class="divider">
                        <span>or continue with</span>
                    </div>

                    <div class="social-register">
                        <button class="social-btn google">
                            <i class="fab fa-google"></i>
                            Google
                        </button>
                        <button class="social-btn facebook">
                            <i class="fab fa-facebook-f"></i>
                            Facebook
                        </button>
                    </div>

                    <p class="login-link">
                        Already have an account? <a href="login.html">Log in here</a>
                    </p>
                </div>
            </div>
        </section>
    </div>

    <!-- ===== VUE SECTION ===== -->
    <script>
        const { createApp, ref, reactive } = Vue;

        const app = createApp({
            setup() {
                const firstName = ref('');
                const lastName = ref('');
                const email = ref('');
                const phone = ref('');
                const password = ref('');
                const confirmPassword = ref('');
                const agreeTerms = ref(false);
                const showPassword = ref(false);
                const showConfirmPassword = ref(false);

                const errors = reactive({
                    firstName: '',
                    lastName: '',
                    email: '',
                    password: '',
                    confirmPassword: ''
                });

                const validateField = (field) => {
                    if (field === 'firstName') {
                        if (!firstName.value || firstName.value.trim() === '') {
                            errors.firstName = 'First name is required';
                        } else {
                            errors.firstName = '';
                        }
                    }
                    if (field === 'lastName') {
                        if (!lastName.value || lastName.value.trim() === '') {
                            errors.lastName = 'Last name is required';
                        } else {
                            errors.lastName = '';
                        }
                    }
                    if (field === 'email') {
                        if (!email.value || email.value.trim() === '') {
                            errors.email = 'Email is required';
                        } else if (!isValidEmail(email.value)) {
                            errors.email = 'Please enter a valid email address';
                        } else {
                            errors.email = '';
                        }
                    }
                    if (field === 'password') {
                        if (!password.value || password.value.trim() === '') {
                            errors.password = 'Password is required';
                        } else if (password.value.length < 6) {
                            errors.password = 'Password must be at least 6 characters';
                        } else {
                            errors.password = '';
                        }
                    }
                    if (field === 'confirmPassword') {
                        if (!confirmPassword.value || confirmPassword.value.trim() === '') {
                            errors.confirmPassword = 'Please confirm your password';
                        } else if (confirmPassword.value !== password.value) {
                            errors.confirmPassword = 'Passwords do not match';
                        } else {
                            errors.confirmPassword = '';
                        }
                    }
                };

                const isValidEmail = (email) => {
                    const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                    return re.test(email);
                };

                const validateForm = () => {
                    let isValid = true;
                    
                    // Validate all required fields
                    const fields = ['firstName', 'lastName', 'email', 'password', 'confirmPassword'];
                    fields.forEach(field => validateField(field));
                    
                    // Check if any errors exist
                    for (let key in errors) {
                        if (errors[key] !== '') {
                            isValid = false;
                            break;
                        }
                    }
                    
                    // Check for empty required fields
                    if (!firstName.value || firstName.value.trim() === '') {
                        errors.firstName = 'First name is required';
                        isValid = false;
                    }
                    if (!lastName.value || lastName.value.trim() === '') {
                        errors.lastName = 'Last name is required';
                        isValid = false;
                    }
                    if (!email.value || email.value.trim() === '') {
                        errors.email = 'Email is required';
                        isValid = false;
                    } else if (!isValidEmail(email.value)) {
                        errors.email = 'Please enter a valid email address';
                        isValid = false;
                    }
                    if (!password.value || password.value.trim() === '') {
                        errors.password = 'Password is required';
                        isValid = false;
                    } else if (password.value.length < 6) {
                        errors.password = 'Password must be at least 6 characters';
                        isValid = false;
                    }
                    if (!confirmPassword.value || confirmPassword.value.trim() === '') {
                        errors.confirmPassword = 'Please confirm your password';
                        isValid = false;
                    } else if (confirmPassword.value !== password.value) {
                        errors.confirmPassword = 'Passwords do not match';
                        isValid = false;
                    }
                    
                    return isValid;
                };

                const togglePasswordVisibility = () => {
                    showPassword.value = !showPassword.value;
                };

                const toggleConfirmPasswordVisibility = () => {
                    showConfirmPassword.value = !showConfirmPassword.value;
                };

                const handleRegister = () => {
                    if (validateForm()) {
                        if (!agreeTerms.value) {
                            alert('Please agree to the Terms & Conditions.');
                            return;
                        }
                        const fullName = `${firstName.value} ${lastName.value}`;
                        alert(`Account created successfully for ${fullName}!`);
                        // window.location.href = 'login.html';
                    }
                };

                return {
                    firstName,
                    lastName,
                    email,
                    phone,
                    password,
                    confirmPassword,
                    agreeTerms,
                    showPassword,
                    showConfirmPassword,
                    errors,
                    validateField,
                    togglePasswordVisibility,
                    toggleConfirmPasswordVisibility,
                    handleRegister
                };
            }
        });

        app.mount('#app');
    </script>
</body>
</html>
